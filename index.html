  <style>
        :root {
            --glass: rgba(0, 0, 0, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #afffaf;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background-color: #1a1a1a;
            background-size: cover;
            background-position: center;
            transition: background 1s ease;
            overflow: hidden;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            z-index: 100;
        }

        .logo { cursor: pointer; font-weight: bold; letter-spacing: 2px; }
        .nav-links span { margin-left: 20px; cursor: pointer; font-size: 0.8rem; opacity: 0.7; transition: 0.3s; }
        .nav-links span:hover { opacity: 1; color: var(--accent); }

        /* --- Main UI --- */
        .stats-island {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 20px;
            display: flex; gap: 40px;
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .stat-label { font-size: 0.6rem; opacity: 0.7; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: bold; }

        .timer-display {
            font-size: 10rem;
            font-weight: 200;
            margin: 10px 0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        /* --- Side Panels --- */
        .side-panel {
            position: fixed;
            top: 0; right: -350px;
            width: 320px; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 80px 30px;
            transition: 0.4s ease-in-out;
            z-index: 90;
            box-sizing: border-box;
        }
        .side-panel.active { right: 0; }
        #tasks-panel { left: -350px; right: auto; }
        #tasks-panel.active { left: 0; }

        input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* --- Music Player --- */
        .music-bar {
            position: fixed;
            bottom: 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid var(--glass-border);
        }

        .music-controls span { cursor: pointer; font-size: 1.2rem; }
        #track-label { font-size: 0.7rem; opacity: 0.6; width: 120px; overflow: hidden; white-space: nowrap; }

        /* --- Task List --- */
        #todo-list { list-style: none; padding: 0; }
        .todo-item {
            background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 8px;
            margin-bottom: 8px; display: flex;
            justify-content: space-between; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="changeBackground()">COZY POMO 🌊</div>
        <div class="nav-links">
            <span onclick="togglePanel('tasks-panel')">TASKS</span>
            <span onclick="togglePanel('settings-panel')">SETTINGS</span>
        </div>
    </nav>

    <div class="stats-island">
        <div>
            <div class="stat-label">Focus Record</div>
            <div class="stat-value" id="focus-total">0m 0s</div>
        </div>
        <div>
            <div class="stat-label">Break Record</div>
            <div class="stat-value" id="break-total">0m 0s</div>
        </div>
    </div>

    <div class="timer-display" id="timer-display">25:00</div>

    <div class="controls">
        <button class="btn" onclick="startTimer()">Start</button>
        <button class="btn" onclick="pauseTimer()">Pause</button>
        <button class="btn" onclick="runBreak()">Break</button>
        <button class="btn" onclick="resetTimer()">Reset</button>
    </div>

    <div class="side-panel" id="settings-panel">
        <h3 style="color:var(--accent)">Settings ⚙️</h3>
        <label style="font-size: 0.7rem;">ALARM SOUND</label>
        <button id="mute-btn" class="btn" style="width:100%; margin-bottom: 20px;" onclick="toggleMute()">ON 🔊</button>
        
        <label style="font-size: 0.7rem;">FOCUS MINS</label>
        <input type="number" id="focus-input" value="25">
        
        <label style="font-size: 0.7rem;">BREAK MINS</label>
        <input type="number" id="break-input" value="5">
        
        <button class="btn" style="width:100%; margin-top: 10px;" onclick="applySettings()">Apply Changes</button>
        <button class="btn" style="width:100%; margin-top: 40px; color: #ff6b6b;" onclick="resetStats()">Reset All Progress</button>
    </div>

    <div class="side-panel" id="tasks-panel">
        <h3 style="color:var(--accent)">Task List ✅</h3>
        <input type="text" id="todo-input" placeholder="What's the plan?">
        <button class="btn" style="width:100%" onclick="addTask()">Add Task</button>
        <ul id="todo-list"></ul>
    </div>

    <div class="music-bar">
        <div class="music-controls">
            <span onclick="prevTrack()">⏮</span>
            <span id="play-pause-btn" onclick="toggleMusic()">▶</span>
            <span onclick="nextTrack()">⏭</span>
        </div>
        <div id="track-label">ALPHA WAVES</div>
    </div>

    <script>
        // --- 1. CONFIG & STATE ---
        const images = [
            "Grey Mountains.jpg",
            "The street.jpg",
            "Green water.jpg"
        ];
        let currentImg = 0;
        
        let focusMins = 25, breakMins = 5;
        let focusSecs = 0, breakSecs = 0;
        let timeLeft = focusMins * 60;
        let timerVar = null;
        let isBreak = false;
        let startTime;

        // Alarm & Music
        let isMuted = false;
        const alarmSound = new Audio("beep alarm final.mp3"); 
        alarmSound.loop = true;

        const tracks = ["Alpha waves 1.mp3", "White Noise 1.mp3"];
        let currentTrack = 0, playing = false;
        let audio = new Audio(tracks[currentTrack]);
        audio.loop = true;

        // --- 2. PERSISTENCE ---
        function saveProgress() {
            const data = { focusSecs, breakSecs, focusMins, breakMins, currentImg };
            localStorage.setItem('cozyPomoFullData', JSON.stringify(data));
        }

        function loadProgress() {
            const saved = localStorage.getItem('cozyPomoFullData');
            if (saved) {
                const d = JSON.parse(saved);
                focusSecs = d.focusSecs || 0;
                breakSecs = d.breakSecs || 0;
                focusMins = d.focusMins || 25;
                breakMins = d.breakMins || 5;
                currentImg = d.currentImg || 0;
                
                document.getElementById('focus-input').value = focusMins;
                document.getElementById('break-input').value = breakMins;
                timeLeft = focusMins * 60;
                updateStatsUI();
                updateDisplay();
                updateBackground();
            }
        }

        // --- 3. CORE LOGIC ---
        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const display = `${m}:${s < 10 ? '0' : ''}${s}`;
            document.getElementById('timer-display').innerText = display;
            document.title = `${display} | Cozy Pomo`;
        }

        function updateStatsUI() {
            document.getElementById('focus-total').innerText = `${Math.floor(focusSecs/60)}m ${focusSecs%60}s`;
            document.getElementById('break-total').innerText = `${Math.floor(breakSecs/60)}m ${breakSecs%60}s`;
        }

        function startTimer() {
            if (timerVar) return;
            // Unlock audio
            alarmSound.play().then(() => { alarmSound.pause(); alarmSound.currentTime = 0; }).catch(()=>{});
            
            startTime = Date.now();
            let initialTime = timeLeft;

            timerVar = setInterval(() => {
                const secondsPassed = Math.floor((Date.now() - startTime) / 1000);
                timeLeft = initialTime - secondsPassed;

                if (!isBreak) focusSecs++; else breakSecs++;

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    pauseTimer();
                    if(!isMuted) { alarmSound.play(); }
                    alert(isBreak ? "Break Over!" : "Focus Complete!");
                    alarmSound.pause(); alarmSound.currentTime = 0;
                }
                
                updateDisplay();
                updateStatsUI();
                saveProgress();
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerVar); timerVar = null; }
        
        function resetTimer() {
            pauseTimer(); isBreak = false;
            timeLeft = focusMins * 60;
            updateDisplay();
        }

        function runBreak() {
            pauseTimer(); isBreak = true;
            timeLeft = breakMins * 60;
            updateDisplay();
            startTimer();
        }

        // --- 4. UI FEATURES ---
        function togglePanel(id) {
            const panel = document.getElementById(id);
            const isActive = panel.classList.contains('active');
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
            if (!isActive) panel.classList.add('active');
        }

        function applySettings() {
            focusMins = parseInt(document.getElementById('focus-input').value) || 25;
            breakMins = parseInt(document.getElementById('break-input').value) || 5;
            saveProgress();
            resetTimer();
            togglePanel('settings-panel');
        }

        function changeBackground() {
            currentImg = (currentImg + 1) % images.length;
            updateBackground();
            saveProgress();
        }

        function updateBackground() {
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${images[currentImg]}')`;
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').innerText = isMuted ? "OFF 🔇" : "ON 🔊";
        }

        function toggleMusic() {
            if (playing) { audio.pause(); document.getElementById('play-pause-btn').innerText = '▶'; }
            else { audio.play(); document.getElementById('play-pause-btn').innerText = '⏸'; }
            playing = !playing;
        }

        function loadTrack(idx) {
            audio.pause();
            currentTrack = idx;
            audio = new Audio(tracks[currentTrack]);
            audio.loop = true;
            document.getElementById('track-label').innerText = tracks[currentTrack].split('.')[0].toUpperCase();
            if (playing) audio.play();
        }

        function nextTrack() { loadTrack((currentTrack + 1) % tracks.length); }
        function prevTrack() { loadTrack((currentTrack - 1 + tracks.length) % tracks.length); }

        function addTask() {
            const val = document.getElementById('todo-input').value;
            if (!val) return;
            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `<span>${val}</span><span style="cursor:pointer" onclick="this.parentElement.remove()">✕</span>`;
            document.getElementById('todo-list').appendChild(li);
            document.getElementById('todo-input').value = "";
        }

        function resetStats() {
            if(confirm("Wipe all progress?")) {
                focusSecs = 0; breakSecs = 0;
                saveProgress(); updateStatsUI();
            }
        }

        // Init
        loadProgress();
        updateBackground();
    </script>
</body>
