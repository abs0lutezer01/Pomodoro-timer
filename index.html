<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Pomodoro</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Added transition for a smooth fade effect */
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        #pomodoro-app {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 360px;
            color: white;
        }

        /* --- New Button Style --- */
        #bg-switcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        #bg-switcher:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        #timer-display { font-size: 5rem; font-weight: 800; margin: 10px 0; }
        .session-info { font-size: 0.9rem; opacity: 0.8; margin-bottom: 10px; }
        .controls button { padding: 12px 18px; font-size: 0.8rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; margin: 5px; text-transform: uppercase; }
        .btn-start { background-color: #2ecc71; color: white; }
        .btn-pause { background-color: #f1c40f; color: white; }
        .btn-reset { background-color: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); }
        .settings { margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.2); display: flex; justify-content: center; gap: 8px; }
        input { padding: 10px; width: 90px; border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 10px; background: rgba(0, 0, 0, 0.4); color: white; text-align: center; }
        .btn-set { background: white; color: #333; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pomodoro-app">
        <div class="session-info">SESSIONS COMPLETED: <span id="session-count">0</span></div>
        <h1 id="timer-display">25:00</h1>
        
        <div class="controls">
            <button class="btn-start" onclick="startTimer()">Start</button>
            <button class="btn-pause" onclick="pauseTimer()">Pause</button>
            <button class="btn-reset" onclick="resetTimer()">Reset</button>
        </div>

        <div class="settings">
            <input type="number" id="user-minutes" placeholder="Mins" min="1">
            <button class="btn-set" onclick="setCustomTime()">Set</button>
        </div>
    </div>

    <button id="bg-switcher" onclick="changeBackground()">🖼️ Change Background</button>

    <script src="script.js"></script>
</body>
</html>
