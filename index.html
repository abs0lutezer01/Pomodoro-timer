    <title>Cozy Pomodoro | Aesthetic Timer</title>
  <style>
        :root {
            --glass: rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #afffaf;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            background: #1a1a1a url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            transition: background 1s ease;
        }

        /* Stats Island */
        .stats-island {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 15px 30px;
            border-radius: 20px;
            display: flex;
            gap: 40px;
            border: 1px solid var(--glass-border);
            margin-bottom: 40px;
            text-align: center;
        }

        .stat-label { font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; }

        /* Timer display */
        .timer-display {
            font-size: 12rem;
            font-weight: bold;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 10px 0;
        }

        .controls { display: flex; gap: 15px; }

        .btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        
        /* Side Panels */
        .side-panel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 300px;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            padding: 40px;
            transition: 0.4s ease-in-out;
            z-index: 100;
        }
        .side-panel.active { right: 0; }

        input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            margin: 10px 0 20px;
            border-radius: 8px;
        }

        .toggle-settings { position: fixed; bottom: 20px; right: 20px; cursor: pointer; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="stats-island">
        <div>
            <div class="stat-label">FOCUS</div>
            <div class="stat-value" id="focus-total">0m 0s</div>
        </div>
        <div>
            <div class="stat-label">BREAK</div>
            <div class="stat-value" id="break-total">0m 0s</div>
        </div>
    </div>

    <div class="timer-display" id="timer-display">25:00</div>

    <div class="controls">
        <button class="btn" onclick="startTimer()">Start</button>
        <button class="btn" onclick="pauseTimer()">Pause</button>
        <button class="btn" onclick="runBreak()">Break</button>
        <button class="btn" onclick="resetTimer()">Reset</button>
    </div>

    <div class="toggle-settings" onclick="toggleSettings()">⚙️ SETTINGS</div>

    <div class="side-panel" id="settings-panel">
        <h3>Settings</h3>
        <label>Focus Minutes</label>
        <input type="number" id="focus-input" value="25">
        <label>Break Minutes</label>
        <input type="number" id="break-input" value="5">
        <button class="btn" style="width:100%" onclick="applySettings()">Apply & Save</button>
        <button class="btn" style="width:100%; margin-top: 10px; color: #ff6b6b;" onclick="resetStats()">Reset All Progress</button>
    </div>

    <script>
        // --- DATA STATE ---
        let focusMins = 25, breakMins = 5;
        let focusSecs = 0, breakSecs = 0;
        let timeLeft = focusMins * 60;
        let timerVar = null;
        let isBreak = false;
        let startTime;

        // --- 1. MEMORY LOGIC (LocalStorage) ---
        function saveProgress() {
            const data = {
                focusSecs, breakSecs, focusMins, breakMins
            };
            localStorage.setItem('pomoSaveData', JSON.stringify(data));
        }

        function loadProgress() {
            const saved = localStorage.getItem('pomoSaveData');
            if (saved) {
                const data = JSON.parse(saved);
                focusSecs = data.focusSecs || 0;
                breakSecs = data.breakSecs || 0;
                focusMins = data.focusMins || 25;
                breakMins = data.breakMins || 5;
                
                // Update UI from memory
                document.getElementById('focus-input').value = focusMins;
                document.getElementById('break-input').value = breakMins;
                timeLeft = focusMins * 60;
                updateStatsUI();
                updateDisplay();
            }
        }

        // --- 2. TIMER LOGIC ---
        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const display = `${m}:${s < 10 ? '0' : ''}${s}`;
            document.getElementById('timer-display').innerText = display;
            document.title = `${display} | Cozy Pomo`;
        }

        function updateStatsUI() {
            document.getElementById('focus-total').innerText = `${Math.floor(focusSecs/60)}m ${focusSecs%60}s`;
            document.getElementById('break-total').innerText = `${Math.floor(breakSecs/60)}m ${breakSecs%60}s`;
        }

        function startTimer() {
            if (timerVar) return;
            startTime = Date.now();
            let initialTime = timeLeft;

            timerVar = setInterval(() => {
                const secondsPassed = Math.floor((Date.now() - startTime) / 1000);
                timeLeft = initialTime - secondsPassed;

                if (!isBreak) focusSecs++; else breakSecs++;

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    pauseTimer();
                    alert("Session Complete!");
                }
                
                updateDisplay();
                updateStatsUI();
                saveProgress(); // Auto-save every second
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerVar); timerVar = null; }

        function resetTimer() {
            pauseTimer();
            isBreak = false;
            timeLeft = focusMins * 60;
            updateDisplay();
        }

        function runBreak() {
            pauseTimer();
            isBreak = true;
            timeLeft = breakMins * 60;
            updateDisplay();
            startTimer();
        }

        // --- 3. SETTINGS LOGIC ---
        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('active');
        }

        function applySettings() {
            focusMins = parseInt(document.getElementById('focus-input').value);
            breakMins = parseInt(document.getElementById('break-input').value);
            saveProgress();
            resetTimer();
            toggleSettings();
        }

        function resetStats() {
            if(confirm("Clear all your study records?")) {
                focusSecs = 0; breakSecs = 0;
                saveProgress();
                updateStatsUI();
            }
        }

        // Initialize on load
        loadProgress();
    </script>
</body>
</html>
