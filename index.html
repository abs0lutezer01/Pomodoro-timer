<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Pomodoro</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column; /* Stack elements vertically */
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            color: white;
        }

        /* --- BIG TIMER (No Box) --- */
        #timer-display {
            font-size: 12rem; /* Massive size */
            font-weight: 900;
            margin: 0;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Shadow makes it readable without a box */
            letter-spacing: -5px;
            line-height: 1;
        }

        .session-info {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            opacity: 0.9;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* --- BUTTON GROUP --- */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        /* Each button gets its own Glass Box */
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 40px; /* Bigger buttons */
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .glass-btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        /* Button-specific glows */
        .btn-start:hover { border-color: #2ecc71; color: #2ecc71; }
        .btn-pause:hover { border-color: #f1c40f; color: #f1c40f; }
        .btn-reset:hover { border-color: #e74c3c; color: #e74c3c; }

        /* --- SETTINGS AREA --- */
        .settings {
            margin-top: 50px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 15px;
            color: white;
            width: 120px;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
        }

        /* Switcher button in bottom left */
        #bg-switcher {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            #timer-display { font-size: 6rem; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="session-info">Session: <span id="session-count">0</span></div>
    
    <h1 id="timer-display">25:00</h1>

    <div class="controls">
        <button class="glass-btn btn-start" onclick="startTimer()">Start</button>
        <button class="glass-btn btn-pause" onclick="pauseTimer()">Pause</button>
        <button class="glass-btn btn-reset" onclick="resetTimer()">Reset</button>
    </div>

    <div class="settings">
        <input type="number" id="user-minutes" class="glass-input" placeholder="Mins">
        <button class="glass-btn" style="padding: 15px 25px;" onclick="setCustomTime()">Set</button>
    </div>

    <button id="bg-switcher" onclick="changeBackground()">🖼️ Switch Scene</button>

    <script src="script.js"></script>
</body>
</html>
