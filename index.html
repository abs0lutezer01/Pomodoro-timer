    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease;
            background-size: cover;
            background-position: center;
            background-color: #222;
            color: white;
            text-align: center;
        }

        /* Stats Island */
        .stats-island {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 1.2rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px; }

        #timer-display { font-size: 12rem; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; }

        /* Panels (To-Do & Settings) */
        .side-panel {
            position: fixed;
            top: 20px;
            bottom: 80px;
            width: 300px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        #todo-panel { left: -320px; text-align: left; }
        #todo-panel.active { left: 20px; }
        
        #settings-panel { right: -320px; text-align: center; }
        #settings-panel.active { right: 20px; }

        .panel-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        /* Inputs */
        input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }

        .todo-list { list-style: none; padding: 0; max-height: 350px; overflow-y: auto; }
        .todo-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Buttons */
        .controls { display: flex; gap: 15px; margin-top: 30px; }
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            transition: 0.3s;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.2); }

        .music-island { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); padding: 15px; border-radius: 20px; width: 220px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Bottom Row Buttons */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="side-panel" id="todo-panel">
        <div class="panel-header">Tasks <span>📝</span></div>
        <input type="text" id="todo-input" placeholder="Add a task..." onkeypress="if(event.key==='Enter') addTask()">
        <ul class="todo-list" id="todo-list"></ul>
    </div>

    <div class="side-panel" id="settings-panel">
        <div class="panel-header">Settings <span>⚙️</span></div>
        <label style="font-size: 0.7rem; opacity: 0.8;">FOCUS MINUTES</label>
        <input type="number" id="focus-input" value="25">
        <label style="font-size: 0.7rem; opacity: 0.8;">BREAK MINUTES</label>
        <input type="number" id="break-input" value="5">
        <button class="glass-btn" style="width: 100%;" onclick="applySettings()">Apply Time</button>
    </div>

    <div class="stats-island">
        <div><span class="stat-label">FOCUS</span><span id="focus-total" class="stat-value">0m 0s</span></div>
        <div><span class="stat-label">BREAK</span><span id="break-total" class="stat-value">0m 0s</span></div>
        <button onclick="resetStats()" style="background:none; border:none; color:white; cursor:pointer;">🔄</button>
    </div>

    <h1 id="timer-display">25:00</h1>

    <div class="controls">
        <button class="glass-btn" onclick="startTimer()">Start</button>
        <button class="glass-btn" onclick="pauseTimer()">Pause</button>
        <button class="glass-btn" onclick="runBreak()" style="color: #afffaf;">Break</button>
        <button class="glass-btn" onclick="resetTimer()">Reset</button>
    </div>

    <div class="bottom-nav">
        <button class="glass-btn" onclick="changeBackground()">🖼️ Scene</button>
        <button class="glass-btn" onclick="togglePanel('todo-panel')">📝 Tasks</button>
        <button class="glass-btn" onclick="togglePanel('settings-panel')">⚙️ Time</button>
    </div>

    <div class="music-island">
        <div id="track-label" style="font-size: 0.7rem; margin-bottom: 8px; font-weight: bold;">ALPHA WAVES 1</div>
        <div style="display: flex; gap: 8px; justify-content: center;">
            <button style="background:none; border:1px solid rgba(255,255,255,0.2); color:white; cursor:pointer;" onclick="prevTrack()">⏮</button>
            <button style="background:none; border:1px solid rgba(255,255,255,0.2); color:white; cursor:pointer;" id="play-pause-btn" onclick="toggleMusic()">▶</button>
            <button style="background:none; border:1px solid rgba(255,255,255,0.2); color:white; cursor:pointer;" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
