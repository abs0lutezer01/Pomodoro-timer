<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Pomodoro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease;
            background-size: cover;
            background-position: center;
            background-color: #222;
            color: white;
            text-align: center;
        }

        .stats-island {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 1.2rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px; }

        #timer-display {
            font-size: 12rem;
            font-weight: 900;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
        }

        .controls { display: flex; gap: 15px; margin-top: 30px; }
        
        /* Settings Styles */
        .settings-container {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }
        .setting-group { display: flex; flex-direction: column; gap: 5px; }
        .setting-label { font-size: 0.6rem; font-weight: bold; opacity: 0.8; }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px;
            border-radius: 8px;
            color: white;
            width: 70px;
            text-align: center;
            outline: none;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .glass-btn:hover { background: rgba(255,255,255,0.2); }

        .music-island {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 20px;
            width: 220px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .music-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        #bg-switcher { position: fixed; bottom: 20px; left: 20px; }
    </style>
</head>
<body>

    <div class="stats-island">
        <div><span class="stat-label">FOCUS</span><span id="focus-total" class="stat-value">0m 0s</span></div>
        <div><span class="stat-label">BREAK</span><span id="break-total" class="stat-value">0m 0s</span></div>
        <button onclick="resetStats()" style="background:none; border:none; color:white; cursor:pointer; font-size: 1.2rem;">🔄</button>
    </div>

    <h1 id="timer-display">25:00</h1>

    <div class="controls">
        <button class="glass-btn" onclick="startTimer()">Start</button>
        <button class="glass-btn" onclick="pauseTimer()">Pause</button>
        <button class="glass-btn" id="break-btn-trigger" onclick="runBreak()" style="color: #afffaf;">Break</button>
        <button class="glass-btn" onclick="resetTimer()">Reset</button>
    </div>

    <div class="settings-container">
        <div class="setting-group">
            <span class="setting-label">FOCUS MINS</span>
            <input type="number" id="focus-input" class="glass-input" value="25">
        </div>
        <div class="setting-group">
            <span class="setting-label">BREAK MINS</span>
            <input type="number" id="break-input" class="glass-input" value="5">
        </div>
        <button class="glass-btn" style="margin-top: 15px;" onclick="applySettings()">Apply</button>
    </div>

    <button id="bg-switcher" class="glass-btn" onclick="changeBackground()">🖼️ Switch Scene</button>

    <div class="music-island">
        <div id="track-label" style="font-size: 0.7rem; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px;">ALPHA WAVES 1</div>
        <div style="display: flex; gap: 8px; justify-content: center;">
            <button class="music-btn" onclick="prevTrack()">⏮</button>
            <button class="music-btn" id="play-pause-btn" onclick="toggleMusic()">▶</button>
            <button class="music-btn" onclick="nextTrack()">⏭</button>
            <button class="music-btn" id="repeat-btn" onclick="toggleRepeat()" style="opacity:0.5">🔁</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
