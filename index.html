<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Pomodoro</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        #timer-display {
            font-size: 14rem; 
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -8px;
        }

        .session-info {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .glass-island {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .glass-island:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.25);
        }

        .settings {
            margin-top: 40px;
            display: flex;
            gap: 10px;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100px;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        /* --- SPOTIFY BOX --- */
        .spotify-island {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 320px;
            height: 380px; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        #bg-switcher {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 900px) {
            #timer-display { font-size: 8rem; }
            .spotify-island { display: none; }
        }
    </style>
</head>
<body>

    <div class="session-info">Session: <span id="session-count">0</span></div>
    <h1 id="timer-display">25:00</h1>

    <div class="controls">
        <button class="glass-island" onclick="startTimer()">Start</button>
        <button class="glass-island" onclick="pauseTimer()">Pause</button>
        <button class="glass-island" onclick="resetTimer()">Reset</button>
    </div>

    <div class="settings">
        <input type="number" id="user-minutes" class="glass-input" placeholder="Mins">
        <button class="glass-island" style="padding: 12px 20px;" onclick="setCustomTime()">Set</button>
    </div>

    <button id="bg-switcher" onclick="changeBackground()">🖼️ Switch Scene</button>

    <div class="spotify-island">
        <iframe style="border-radius:15px" 
    src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZqd5Jv99mS5?utm_source=generator" 
    width="100%" 
    height="350" 
    frameBorder="0" 
    allowfullscreen="" 
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
    loading="lazy">
</iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
