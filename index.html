<head>
    <meta charset="UTF-8">

    <title>Cozy Pomodoro | Aesthetic Timer</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease;
            background-size: cover;
            background-position: center;
            background-color: #222;
            color: white;
            text-align: center;
        }

        /* Stats Island */
        .stats-island {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 1.2rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px; }

        /* Mode Switcher */
        .mode-switch {
    margin-bottom: 15px;
    font-size: 0.8rem;
    letter-spacing: 2px;
    opacity: 0.6;
    cursor: pointer;
    transition: 0.3s;
    /* FIX THE GLITCH: */
    display: inline-block; 
    user-select: none; /* Prevents text from being highlighted while clicking */
    padding: 10px;    /* Gives your mouse a bigger area to click */
}

.mode-switch:hover { 
    opacity: 1; 
    transform: scale(1.05); /* Smoothly grows instead of glitching */
}

.active-mode { 
    font-weight: bold; 
    color: #afffaf; 
    opacity: 1; 
    text-shadow: 0 0 10px rgba(175, 255, 175, 0.5); /* Glow effect */
}
        .mode-switch:hover { opacity: 1; }
        .active-mode { font-weight: bold; color: #afffaf; opacity: 1; }

        #timer-display { font-size: 12rem; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; }

        /* Side Panels */
        .side-panel {
            position: fixed;
            top: 20px;
            bottom: 80px;
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        #todo-panel { left: -320px; text-align: left; }
        #todo-panel.active { left: 20px; }
        
        #settings-panel { right: -320px; text-align: center; }
        #settings-panel.active { right: 20px; }

        .panel-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 10px;
            color: white;
            margin-bottom: 15px;
            outline: none;
        }

        .todo-list { list-style: none; padding: 0; max-height: 350px; overflow-y: auto; }
        .todo-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Buttons */
        .controls { display: flex; gap: 15px; margin-top: 30px; }
        .glass-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 20px;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .bottom-nav { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 10px; }
        .music-island { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); padding: 15px; border-radius: 20px; width: 220px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="side-panel" id="todo-panel">
        <div class="panel-header">Tasks 📝</div>
        <input type="text" id="todo-input" placeholder="Add a task..." onkeypress="if(event.key==='Enter') addTask()">
        <ul class="todo-list" id="todo-list"></ul>
    </div>

   <div class="side-panel" id="settings-panel">
    <div class="panel-header">Settings ⚙️</div>
    
    <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px;">
        <span style="font-size: 0.8rem;">ALARM SOUND</span>
        <button id="mute-btn" class="glass-btn" style="padding: 5px 10px; font-size: 0.6rem;" onclick="toggleMute()">ON 🔊</button>
    </div>

    <label style="font-size: 0.7rem; opacity: 0.8;">FOCUS MINUTES</label>
    <input type="number" id="focus-input" value="25">
    
    <label style="font-size: 0.7rem; opacity: 0.8;">BREAK MINUTES</label>
    <input type="number" id="break-input" value="5">
    
    <button class="glass-btn" style="width: 100%;" onclick="applySettings()">Apply Time</button>
</div>

    <div class="stats-island">
        <div><span class="stat-label">FOCUS</span><span id="focus-total" class="stat-value">0m 0s</span></div>
        <div><span class="stat-label">BREAK</span><span id="break-total" class="stat-value">0m 0s</span></div>
        <button onclick="resetStats()" style="background:none; border:none; color:white; cursor:pointer;">🔄</button>
    </div>

    <div class="mode-switch" onclick="toggleTimerMode()">
        <span id="pomo-label" class="active-mode">POMODORO</span> | 
        <span id="stopwatch-label">STOPWATCH</span>
    </div>

    <h1 id="timer-display">25:00</h1>

    <div class="controls">
        <button class="glass-btn" onclick="startTimer()">Start</button>
        <button class="glass-btn" onclick="pauseTimer()">Pause</button>
        <button class="glass-btn" onclick="runBreak()" id="break-btn" style="color: #afffaf;">Break</button>
        <button class="glass-btn" onclick="resetTimer()">Reset</button>
    </div>

    <div class="bottom-nav">
        <button class="glass-btn" onclick="changeBackground()">🖼️ Scene</button>
        <button class="glass-btn" onclick="togglePanel('todo-panel')">📝 Tasks</button>
        <button class="glass-btn" onclick="togglePanel('settings-panel')">⚙️ Time</button>
    </div>

    <div class="music-island">
        <div id="track-label" style="font-size: 0.7rem; margin-bottom: 8px; font-weight: bold;">ALPHA WAVES 1</div>
        <div style="display: flex; gap: 8px; justify-content: center;">
            <button style="background:none; border:1px solid rgba(255,255,255,0.2); color:white;" onclick="prevTrack()">⏮</button>
            <button style="background:none; border:1px solid rgba(255,255,255,0.2); color:white;" id="play-pause-btn" onclick="toggleMusic()">▶</button>
            <button style="background:none; border:1px solid rgba(255,255,255,0.2); color:white;" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
